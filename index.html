<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Biology Systems Web</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f8f9fa; overflow: hidden; }
        
        #nav-bar { padding: 15px 20px; background: #fff; border-bottom: 1px solid #ddd; display: flex; gap: 20px; align-items: center; position: relative; z-index: 100; }
        select { padding: 8px; border-radius: 6px; border: 1px solid #ccc; cursor: pointer; }
        
        /* Fixed Clickable Dropdown Menu */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-btn { padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: bold; color: #2c3e50; transition: background 0.2s; }
        .dropdown-btn:hover { background: #f1f2f6; }
        .dropdown-content { display: none; position: absolute; background: #fff; box-shadow: 0px 8px 16px rgba(0,0,0,0.15); padding: 15px; z-index: 101; border-radius: 8px; min-width: 190px; margin-top: 5px; border: 1px solid #eee; }
        .dropdown-content.show { display: block; }
        .dropdown-content label { display: flex; align-items: center; margin-bottom: 12px; font-size: 14px; cursor: pointer; color: #34495e;}
        .dropdown-content input { margin-right: 10px; cursor: pointer; width: 16px; height: 16px; }
        
        .toggle-container { display: flex; align-items: center; gap: 8px; font-weight: bold; color: #d35400; margin-left: auto;}
        
        #main-content-wrapper { display: flex; width: 100vw; height: calc(100vh - 60px); transition: all 0.5s ease; }
        #biology-network-container { flex: 1 1 100%; position: relative; transition: flex 0.5s ease; overflow: hidden; }
        #flowchart-viewer-container { flex: 0 0 0%; background: white; transition: flex 0.5s ease; position: relative; overflow: hidden; }

        #main-content-wrapper.flowchart-active #biology-network-container { flex: 1 1 50%; }
        #main-content-wrapper.flowchart-active #flowchart-viewer-container { flex: 1 1 50%; border-left: 2px solid #ddd; }

        #biology-network { width: 100%; height: 100%; }
        #flowchart-frame { width: 100%; height: 100%; border: none; }

        #info-panel {
            position: absolute; top: 20px; right: -400px; width: 320px;
            background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px);
            padding: 25px; border-radius: 12px; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 80vh; overflow-y: auto; z-index: 10;
        }
        #info-panel.active { right: 20px; }
        #info-title { margin-top: 5px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; font-size: 1.2rem; }
        .close-btn { position: absolute; top: 12px; right: 15px; cursor: pointer; color: #bdc3c7; font-size: 22px; transition: color 0.2s; }
        .close-btn:hover { color: #e74c3c; }
        
        #flowchart-btn { display: none; margin-top: 20px; padding: 12px; width: 100%; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        #flowchart-btn:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="nav-bar">
        <strong>Unit:</strong>
        <select id="level-filter" onchange="renderNetwork()">
            <option value="All">All Levels</option>
            <option value="Molecules">Molecules</option>
            <option value="Cells">Cells</option>
            <option value="Organisms">Organisms</option>
            <option value="Ecosystems">Ecosystems</option>
        </select>

        <div class="dropdown">
            <div class="dropdown-btn" onclick="toggleDropdown()">Visible Layers ▾</div>
            <div id="layer-dropdown" class="dropdown-content">
                <label><input type="checkbox" id="tier1-toggle" checked onchange="renderNetwork()"> Tier 1: Topics</label>
                <label><input type="checkbox" id="tier2-toggle" checked onchange="renderNetwork()"> Tier 2: Concepts</label>
                <label><input type="checkbox" id="tier3-toggle" checked onchange="renderNetwork()"> Tier 3: Mechanisms</label>
                <label><input type="checkbox" id="tier4-toggle" checked onchange="renderNetwork()"> Tier 4: Components</label>
            </div>
        </div>

        <button onclick="resetFocus()" style="padding: 8px 12px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff;">Reset Map</button>
        
        <div class="toggle-container">
            <input type="checkbox" id="hl-toggle" onchange="renderNetwork()" checked>
            <label for="hl-toggle">HL Content</label>
        </div>
    </div>

    <div id="main-content-wrapper">
        <div id="biology-network-container">
            <div id="biology-network"></div>
            <div id="info-panel">
                <span class="close-btn" onclick="closePanel()">✕</span>
                <h2 id="info-title">Concept</h2>
                <p id="info-desc">Details</p>
                <button id="flowchart-btn">View Pathway Flowchart</button>
            </div>
        </div>
        <div id="flowchart-viewer-container">
            <span class="close-btn" onclick="closeFlowchartViewer()" style="z-index: 100; right: 20px; top: 20px;">✕</span>
            <iframe id="flowchart-frame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        let network = null;
        let allNodes = [];
        let allEdges = [];
        let nodesDataset = new vis.DataSet();
        let edgesDataset = new vis.DataSet();

        function toggleDropdown() {
            document.getElementById("layer-dropdown").classList.toggle("show");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-btn') && !event.target.closest('.dropdown-content')) {
                const dropdowns = document.getElementsByClassName("dropdown-content");
                for (let i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show');
                }
            }
        }

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                allEdges = data.edges;
                allNodes = data.nodes.map(n => {
                    let size = 10;
                    let color = '#bdc3c7';
                    
                    if (n.tier === 1) { size = 48; color = '#3498db'; }
                    else if (n.tier === 2) { size = 32; color = '#2ecc71'; }
                    else if (n.tier === 3) { size = 20; color = '#9b59b6'; } 
                    else if (n.tier === 4) { size = 12; color = '#95a5a6'; } 
                    
                    if (n.isHL) color = '#e67e22'; 
                    
                    return { ...n, size: size, color: { background: color, border: '#2c3e50' }, font: { size: Math.max(14, size/1.2), vadjust: size + 15, strokeWidth: 5, strokeColor: '#ffffff' } };
                });
                initNetwork();
                renderNetwork();
            });

        function initNetwork() {
            const container = document.getElementById('biology-network');
            const options = {
                nodes: { shape: 'dot', borderWidth: 2 },
                edges: { arrows: 'to', color: '#bdc3c7', smooth: { type: 'continuous' } },
                interaction: { zoomSpeed: 0.3, hover: true },
                physics: {
                    enabled: true,
                    forceAtlas2Based: { 
                        gravitationalConstant: -1000, 
                        centralGravity: 0.005, 
                        springLength: 200, 
                        damping: 0.85, 
                        avoidOverlap: 1 
                    },
                    solver: 'forceAtlas2Based',
                    stabilization: { enabled: true, iterations: 150 } 
                }
            };
            
            network = new vis.Network(container, { nodes: nodesDataset, edges: edgesDataset }, options);

            network.on("click", function (params) {
                if (params.nodes.length === 0) return; 

                const clickedId = params.nodes[0];
                const clickedNode = allNodes.find(n => n.id === clickedId);
                
                document.getElementById('info-title').innerText = clickedNode.label + (clickedNode.isHL ? " [HL]" : "");
                document.getElementById('info-desc').innerText = clickedNode.description || "No notes available.";
                document.getElementById('info-panel').classList.add('active');
                
                const flowBtn = document.getElementById('flowchart-btn');
                if (clickedNode.hasPathway) {
                    flowBtn.style.display = 'block';
                    flowBtn.onclick = function() {
                        document.getElementById('main-content-wrapper').classList.add('flowchart-active');
                        closePanel();
                        setTimeout(() => {
                            network.setSize('100%', '100%');
                            network.focus(clickedId, { scale: 1.1, animation: { duration: 500 }});
                            document.getElementById('flowchart-frame').src = `flowchart.html?concept=${encodeURIComponent(clickedNode.label)}`;
                        }, 100);
                    };
                } else {
                    flowBtn.style.display = 'none';
                }

                let connectedIds = [];
                allEdges.forEach(e => {
                    if (e.from === clickedId) connectedIds.push(e.to);
                    if (e.to === clickedId) connectedIds.push(e.from);
                });
                connectedIds.push(clickedId);

                const previouslyVisibleCount = nodesDataset.length;

                let viewNodes = allNodes.filter(n => matchesFilters(n) && (n.tier <= 2 || connectedIds.includes(n.id)));
                let styledNodes = viewNodes.map(n => ({...n, opacity: connectedIds.includes(n.id) ? 1.0 : 0.15}));
                
                let currentIds = nodesDataset.getIds();
                let newIds = styledNodes.map(n => n.id);
                let idsToRemove = currentIds.filter(id => !newIds.includes(id));
                
                nodesDataset.update(styledNodes);
                nodesDataset.remove(idsToRemove);
            
                let visibleEdges = allEdges.filter(e => newIds.includes(e.from) && newIds.includes(e.to));
                let currentEdgeIds = edgesDataset.getIds();
                let newEdgeIds = visibleEdges.map(e => e.id);
                let edgesToRemove = currentEdgeIds.filter(id => !newEdgeIds.includes(id));
                
                edgesDataset.update(visibleEdges);
                edgesDataset.remove(edgesToRemove);

                if (styledNodes.length > previouslyVisibleCount) {
                    network.setOptions({ physics: true });
                } else {
                    network.setOptions({ physics: false });
                }

                // Smooth pan and gentle focus without extreme scaling
                network.focus(clickedId, { scale: 1.1, animation: { duration: 800, easingFunction: 'easeInOutQuad' }});
            });
        }

        function matchesFilters(node) {
            const level = document.getElementById('level-filter').value;
            const showHL = document.getElementById('hl-toggle').checked;
            
            const showT1 = document.getElementById('tier1-toggle').checked;
            const showT2 = document.getElementById('tier2-toggle').checked;
            const showT3 = document.getElementById('tier3-toggle').checked;
            const showT4 = document.getElementById('tier4-toggle').checked;

            if (level !== "All" && node.orgLevel !== level) return false;
            if (!showHL && node.isHL) return false;
            
            if (node.tier === 1 && !showT1) return false;
            if (node.tier === 2 && !showT2) return false;
            if (node.tier === 3 && !showT3) return false;
            if (node.tier === 4 && !showT4) return false;

            return true;
        }

        function renderNetwork() {
            closePanel();
            
            let baseNodes = allNodes.filter(n => matchesFilters(n) && n.tier <= 2).map(n => ({...n, opacity: 1}));
            
            let currentIds = nodesDataset.getIds();
            let newIds = baseNodes.map(n => n.id);
            let idsToRemove = currentIds.filter(id => !newIds.includes(id));
            
            nodesDataset.update(baseNodes);
            nodesDataset.remove(idsToRemove);
            
            let visibleEdges = allEdges.filter(e => newIds.includes(e.from) && newIds.includes(e.to));
            let currentEdgeIds = edgesDataset.getIds();
            let newEdgeIds = visibleEdges.map(e => e.id);
            let edgesToRemove = currentEdgeIds.filter(id => !newEdgeIds.includes(id));
            
            edgesDataset.update(visibleEdges);
            edgesDataset.remove(edgesToRemove);
            
            network.setOptions({ physics: true });
        }

        function closeFlowchartViewer() {
            document.getElementById('main-content-wrapper').classList.remove('flowchart-active');
            document.getElementById('flowchart-frame').src = 'about:blank';
            setTimeout(() => { network.setSize('100%', '100%'); network.fit({ animation: { duration: 500 }}); }, 500);
        }

        function resetFocus() {
            closePanel();
            closeFlowchartViewer();
            renderNetwork();
            network.fit({ animation: { duration: 800 }});
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
    </script>
</body>
</html>
