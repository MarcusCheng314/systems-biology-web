<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Web: Pathobiology Curriculum</title>
    
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #f4f4f9; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #2c3e50; }
        #biology-network {
            width: 90vw;
            height: 80vh;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <h1>Interactive Pathobiology Map</h1>
    <div id="biology-network"></div>

    <script>
        // 1. Fetch the JSON file that n8n automatically updates
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('biology-network');
                
                // 2. Configure the physics and visual styling
                const options = {
                    nodes: {
                        shape: 'dot',
                        size: 20,
                        font: { size: 16, color: '#333' },
                        borderWidth: 2,
                        color: { border: '#2B7CE9', background: '#97C2FC' }
                    },
                    edges: {
                        arrows: 'to',
                        font: { align: 'top', size: 12, color: '#666' },
                        color: { color: '#848484', highlight: '#2B7CE9' },
                        smooth: { type: 'continuous' }
                    },
                    physics: {
                        barnesHut: { gravitationalConstant: -3000, centralGravity: 0.3, springLength: 200 }
                    }
                };

                // 3. Initialize the interactive network
                new vis.Network(container, data, options);
            })
            .catch(error => {
                console.error('Error loading the biology network:', error);
                document.getElementById('biology-network').innerHTML = "<p style='padding:20px;'>Failed to load data. Ensure data.json exists.</p>";
            });
    </script>
</body>
</html>
