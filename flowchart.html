<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pathway Flowchart</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px 40px; margin: 0; background: #fff; }
        #title { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 10px; width: 100%; text-align: center; }
        #graph-container { width: 100%; display: flex; justify-content: center; margin-top: 20px;}
        #error-msg { color: #e74c3c; background: #fadbd8; padding: 15px; border-radius: 8px; display: none; margin-top: 20px; font-size: 14px;}
    </style>
</head>
<body>
    <h1 id="title">Pathway Analysis</h1>
    <div id="error-msg"></div>
    <div id="graph-container" class="mermaid"></div>

    <script>
        mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'neutral', fontFamily: 'Inter' });

        async function renderDynamicFlowchart() {
            const urlParams = new URLSearchParams(window.location.search);
            const conceptName = urlParams.get('concept');
            const container = document.getElementById('graph-container');
            const errorPanel = document.getElementById('error-msg');
            
            document.getElementById('title').innerText = conceptName;

            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const matchedNode = data.nodes.find(n => n.label === conceptName);

                if (matchedNode && matchedNode.pathwaySteps) {
                    
                    // FIX: Safe regex split handles " -> ", "->", and strips quotes to prevent Mermaid Lexer crashes
                    const steps = matchedNode.pathwaySteps.split(/\s*->\s*/);
                    let mermaidDefinition = "graph TD\n";
                    
                    for (let i = 0; i < steps.length - 1; i++) {
                        let safe1 = steps[i].replace(/"/g, "'").trim();
                        let safe2 = steps[i+1].replace(/"/g, "'").trim();
                        mermaidDefinition += `    step${i}["${safe1}"] --> step${i+1}["${safe2}"]\n`;
                    }
                    
                    container.innerHTML = mermaidDefinition;
                    container.removeAttribute('data-processed');
                    await mermaid.run({ nodes: [container] }); 
                } else {
                    throw new Error(`Pathway data not found for "${conceptName}".`);
                }
            } catch (error) {
                console.error('Mermaid error:', error);
                errorPanel.innerText = error.message;
                errorPanel.style.display = 'block';
                container.style.display = 'none';
            }
        }

        renderDynamicFlowchart();
    </script>
</body>
</html>
